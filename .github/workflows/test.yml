name: tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/test_core.py tests/test_tools_web.py tests/test_findings.py tests/test_chains.py tests/test_report.py tests/test_report_polish.py tests/test_html_and_chains_tool.py tests/test_finding_status.py -q
