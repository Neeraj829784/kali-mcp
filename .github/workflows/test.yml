name: tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -q \
            --ignore=tests/test_tier1.py \
            --ignore=tests/test_tier2.py \
            --ignore=tests/test_tier3.py \
            --ignore=tests/test_tools_recon.py \
            --ignore=tests/test_tools_scanning.py \
            --ignore=tests/test_tools_vuln.py \
            --ignore=tests/test_tools_exploit.py \
            --ignore=tests/test_tools_reporting.py
